<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Subscribe for Vibes Hub</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-logo">
      <div class="login-wordmark">PLANETFAB</div>
      <h1>Subscribe for Vibes Hub</h1>
    </div>
    <form class="login-form" action="/auth/login" method="POST">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <div id="errorMsg" class="error-msg" style="display:none">Invalid username or password.</div>
      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>
  </div>
  <script>
    if (location.search.includes('error=1')) {
      document.getElementById('errorMsg').style.display = 'block';
    }
  </script>
</body>
</html>
