<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Subscribe for Vibes Hub</title>
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css">
</head>
<body>

  <header class="app-header">
    <div class="header-brand">
      <span class="header-wordmark">PLANETFAB</span>
      <div class="header-brand-title">
        <h1>Subscribe for Vibes</h1>
        <span class="cost-display" id="costDisplay"></span>
      </div>
    </div>
    <div class="header-actions">
      <span class="header-user" id="headerUser"></span>
      <button class="btn btn-ghost btn-sm" id="bulkToggleBtn" onclick="toggleBulkMode()">Select</button>
      <button class="btn btn-ghost btn-sm" id="checkEmailBtn" onclick="checkEmail()">
        <span class="check-idle">Check Email</span>
        <span class="check-loading">
          <span class="check-spinner"></span>
          <span class="check-ticker-wrap">
            <span class="check-ticker" id="checkProgress">Connecting…</span>
          </span>
        </span>
        <span class="check-done"></span>
      </button>
      <a href="/settings" class="btn btn-ghost btn-sm">Settings</a>
      <a href="/auth/logout" class="btn btn-ghost btn-sm">Logout</a>
    </div>
  </header>

  <!-- Normal mode: filters -->
  <div class="filters" id="filtersBar">
    <button class="filter-btn active" onclick="setFilter('all', this)">All <span class="filter-count" id="count-all"></span></button>
    <button class="filter-btn" onclick="setFilter('Draft', this)">Draft <span class="filter-count" id="count-Draft"></span></button>
    <button class="filter-btn" onclick="setFilter('Approved', this)">Approved <span class="filter-count" id="count-Approved"></span></button>
    <button class="filter-btn" onclick="setFilter('Published', this)">Published <span class="filter-count" id="count-Published"></span></button>
    <button class="filter-btn" onclick="setFilter('Newsletter Ready', this)">Newsletter Ready <span class="filter-count" id="count-Newsletter Ready"></span></button>
    <button class="filter-btn filter-btn-trash" onclick="setFilter('trash', this)">Trash <span class="filter-count" id="count-trash"></span></button>
    <button class="btn btn-ghost btn-sm" id="emptyTrashBtn" style="display:none" onclick="confirmEmptyTrash()">Empty Trash</button>
  </div>

  <!-- Bulk mode: actions bar (hidden by default) -->
  <div class="bulk-bar" id="bulkBar" style="display:none">
    <span class="bulk-count" id="bulkCount">0 selected</span>
    <button class="btn btn-ghost btn-sm" onclick="selectAll()">Select All</button>
    <button class="btn btn-danger btn-sm" id="bulkDeleteBtn" onclick="openBulkDeleteConfirm()" disabled>Delete Selected</button>
    <button class="btn btn-ghost btn-sm" onclick="toggleBulkMode()">Cancel</button>
  </div>

  <div class="cards-grid" id="cardsGrid">
    <div class="empty-state"><h3>Loading&hellip;</h3></div>
  </div>

  <!-- Edit modal -->
  <div class="modal-overlay" id="editModal" style="display:none" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header">
        <h2>Edit Content</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <form id="editForm">
        <input type="hidden" id="editId">
        <div class="field"><label>Piece Title <button type="button" class="copy-btn" data-copy-field="editPieceTitle" title="Copy to clipboard"></button></label><input type="text" id="editPieceTitle"></div>
        <div class="field"><label>Section Name <button type="button" class="copy-btn" data-copy-field="editSectionName" title="Copy to clipboard"></button></label><input type="text" id="editSectionName" placeholder="e.g. What We Happened Upon"></div>
        <div class="field">
          <label>Newsletter Text <span class="field-hint" id="blurbCount"></span><button type="button" class="copy-btn" data-copy-field="editNewsletterBlurb" title="Copy to clipboard"></button></label>
          <textarea id="editNewsletterBlurb" rows="6"></textarea>
        </div>
        <div class="field"><label>LinkedIn Post <button type="button" class="copy-btn" data-copy-field="editLinkedinHook" title="Copy to clipboard"></button></label><textarea id="editLinkedinHook" rows="6"></textarea></div>
        <div class="field"><label>Instagram Caption <button type="button" class="copy-btn" data-copy-field="editInstagramCaption" title="Copy to clipboard"></button></label><textarea id="editInstagramCaption" rows="3"></textarea></div>
        <div class="field">
          <label>Blog Post (full article) <span class="field-hint">600–800 words · edit formatting below · saved to WordPress on publish</span><button type="button" class="copy-btn" data-copy-field="quillEditor" title="Copy to clipboard"></button></label>
          <button type="button" class="btn btn-ghost btn-sm enrich-btn" id="enrichBtn" onclick="enrichCard()">Research &amp; Enrich</button>
          <div class="quill-wrap">
            <div id="quillEditor"></div>
          </div>
        </div>
        <div class="field">
          <label>Meta Description <span class="field-hint" id="metaDescCount"></span><button type="button" class="copy-btn" data-copy-field="editMetaDescription" title="Copy to clipboard"></button></label>
          <input type="text" id="editMetaDescription" placeholder="SEO meta description (150–160 characters)">
        </div>
        <div class="field"><label>Source URLs <button type="button" class="copy-btn" data-copy-field="editSourceUrls" title="Copy to clipboard"></button></label><textarea id="editSourceUrls" rows="2" placeholder="Comma-separated URLs"></textarea></div>
        <div class="field">
          <label>Status</label>
          <select id="editStatus">
            <option value="Draft">Draft</option>
            <option value="Approved">Approved</option>
            <option value="Published">Published</option>
            <option value="Newsletter Ready">Newsletter Ready</option>
          </select>
        </div>
        <div id="editImagesSection" class="field">
          <label>Images <span class="field-hint">Drag to reorder · click &times; to remove · max 3</span></label>
          <div id="editImages" class="edit-images"></div>
          <input type="file" id="imageFileInput" accept="image/jpeg,image/png,image/webp" multiple style="display:none">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Confirm delete modal -->
  <div class="modal-overlay" id="confirmModal" style="display:none" onclick="if(event.target===this)closeConfirm()">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2 id="confirmTitle">Confirm Delete</h2>
        <button class="modal-close" onclick="closeConfirm()">&times;</button>
      </div>
      <p id="confirmMessage" class="confirm-message"></p>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
        <button class="btn btn-danger" id="confirmBtn">Delete</button>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox" style="display:none" onclick="if(event.target===this)closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
    <div class="lightbox-image-wrap">
      <button class="lightbox-nav" id="lightboxPrevBtn" onclick="lightboxNav(-1)">&#8249;</button>
      <img id="lightboxImg" class="lightbox-img" src="" alt="">
      <button class="lightbox-nav" id="lightboxNextBtn" onclick="lightboxNav(1)">&#8250;</button>
    </div>
    <div class="lightbox-footer">
      <span id="lightboxCounter" class="lightbox-counter"></span>
      <a id="lightboxDownload" class="lightbox-download btn btn-ghost btn-sm" download>Download</a>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.js"></script>
  <script src="/js/app.js?v=11"></script>
</body>
</html>
