<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subscribe for Vibes Hub</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>

  <header class="app-header">
    <div class="header-brand">
      <span class="header-wordmark">PlanetFab</span>
      <h1>Subscribe for Vibes Hub</h1>
    </div>
    <div class="header-actions">
      <span class="header-user" id="headerUser"></span>
      <button class="btn btn-secondary btn-sm" id="checkEmailBtn" onclick="checkEmail()">
        Check Email
      </button>
      <a href="/settings" class="btn btn-secondary btn-sm">Settings</a>
      <a href="/auth/logout" class="btn btn-secondary btn-sm">Logout</a>
    </div>
  </header>

  <div class="filters" id="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All <span class="filter-count" id="count-all"></span></button>
    <button class="filter-btn" onclick="setFilter('Draft', this)">Draft <span class="filter-count" id="count-Draft"></span></button>
    <button class="filter-btn" onclick="setFilter('Approved', this)">Approved <span class="filter-count" id="count-Approved"></span></button>
    <button class="filter-btn" onclick="setFilter('Published', this)">Published <span class="filter-count" id="count-Published"></span></button>
    <button class="filter-btn" onclick="setFilter('Newsletter Ready', this)">Newsletter Ready <span class="filter-count" id="count-Newsletter Ready"></span></button>
  </div>

  <div class="cards-grid" id="cardsGrid">
    <div class="empty-state">
      <h3>Loading&hellip;</h3>
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="editModal" style="display:none" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header">
        <h2>Edit Content</h2>
        <button class="modal-close" onclick="closeModal()" aria-label="Close">&times;</button>
      </div>
      <form id="editForm">
        <input type="hidden" id="editId">
        <div class="field">
          <label>Piece Title</label>
          <input type="text" id="editPieceTitle">
        </div>
        <div class="field">
          <label>Section Name</label>
          <input type="text" id="editSectionName" placeholder="e.g. What We Happened Upon">
        </div>
        <div class="field">
          <label>Newsletter Blurb <span class="field-hint" id="blurbCount"></span></label>
          <textarea id="editNewsletterBlurb" rows="6"></textarea>
        </div>
        <div class="field">
          <label>LinkedIn Hook</label>
          <textarea id="editLinkedinHook" rows="2"></textarea>
        </div>
        <div class="field">
          <label>Instagram Caption</label>
          <textarea id="editInstagramCaption" rows="3"></textarea>
        </div>
        <div class="field">
          <label>Blog Potential</label>
          <input type="text" id="editBlogPotential" placeholder="Yes / No + expansion notes">
        </div>
        <div class="field">
          <label>Source URLs</label>
          <textarea id="editSourceUrls" rows="2" placeholder="Comma-separated URLs"></textarea>
        </div>
        <div class="field">
          <label>Status</label>
          <select id="editStatus">
            <option value="Draft">Draft</option>
            <option value="Approved">Approved</option>
            <option value="Published">Published</option>
            <option value="Newsletter Ready">Newsletter Ready</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/js/app.js"></script>
</body>
</html>
